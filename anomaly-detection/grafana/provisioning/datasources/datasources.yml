apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    access: proxy
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus

  - name: TimescaleDB
    type: postgres
    uid: timescaledb
    url: timescaledb:5432
    database: anomalydb
    user: anomaly
    secureJsonData:
      password: anomaly
    access: proxy
    editable: false
    jsonData:
      sslmode: disable
      timescaledb: true

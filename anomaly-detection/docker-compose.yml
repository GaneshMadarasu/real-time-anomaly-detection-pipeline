version: '3.8'

networks:
  anomaly-net:
    driver: bridge

volumes:
  timescale-data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    networks: [anomaly-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    networks: [anomaly-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 2
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    networks: [anomaly-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    networks: [anomaly-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7-alpine
    networks: [anomaly-net]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    networks: [anomaly-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: anomaly
      POSTGRES_PASSWORD: anomaly
      POSTGRES_DB: anomalydb
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "anomaly"]
      interval: 5s
      timeout: 3s
      retries: 10

  producer:
    build: ./services/producer
    networks: [anomaly-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "8001:8001"

  feature-engineer:
    build: ./services/feature-engineer
    networks: [anomaly-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "8002:8002"

  ml-inference:
    build: ./services/ml-inference
    networks: [anomaly-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "8003:8003"

  drift-detector:
    build: ./services/drift-detector
    networks: [anomaly-net]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env
    ports:
      - "8004:8004"

  retraining-worker:
    build: ./services/retraining-worker
    networks: [anomaly-net]
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    ports:
      - "8005:8005"

  alert-router:
    build: ./services/alert-router
    networks: [anomaly-net]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env
    ports:
      - "8006:8006"

  prometheus:
    image: prom/prometheus:v2.45.0
    networks: [anomaly-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d

  grafana:
    image: grafana/grafana:10.0.0
    networks: [anomaly-net]
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - timescaledb
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  celery-flower:
    build: ./services/retraining-worker
    networks: [anomaly-net]
    command: celery -A main flower --port=5555 --address=0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "5555:5555"
